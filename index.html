<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Open Track Driving Simulator</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: none; /* Shown after menu */
            width: 100vw;
            height: 100vh;
        }
        
        /* Menu Overlays */
        #menu-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            color: white;
            min-width: 300px;
            border: 2px solid #ef4444;
            z-index: 100;
        }
        h1 { margin-top: 0; color: #ef4444; font-size: 24px; }
        h2 { font-size: 16px; color: #aaa; margin-bottom: 20px; }
        .menu-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .menu-btn:hover { background: #dc2626; }
        
        /* Gameplay HUD */
        #hud {
            display: none;
            position: absolute;
            top: 15px;
            left: 15px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            border-left: 4px solid #ef4444;
            pointer-events: none;
            z-index: 10;
        }

        /* Mobile Controls Overlay */
        #mobile-controls {
            display: none;
            position: absolute;
            bottom: 20px;
            width: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .touch-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            width: 75px;
            height: 75px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 22px;
            pointer-events: auto;
            touch-action: manipulation;
        }
        .touch-btn:active { background: rgba(255, 255, 255, 0.5); }
        #btn-left { left: 25px; bottom: 30px; }
        #btn-right { left: 115px; bottom: 30px; }
        #btn-gas { right: 25px; bottom: 60px; background: rgba(239, 68, 68, 0.3); }
        #btn-brake { right: 115px; bottom: 20px; background: rgba(255, 255, 255, 0.3); width: 65px; height: 65px; font-size: 14px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="menu-container">
        <div id="step-1">
            <h1>Select Your Platform</h1>
            <h2>Three.js Web 3D Racing</h2>
            <button class="menu-btn" onclick="selectPlatform('mobile')">📱 Mobile Device</button>
            <button class="menu-btn" onclick="selectPlatform('laptop')">💻 Laptop / PC</button>
            <button class="menu-btn" onclick="selectPlatform('console')">🎮 Console Controller</button>
        </div>
        <div id="step-2" style="display: none;">
            <h1>Controller Status</h1>
            <h2>Is your controller connected?</h2>
            <button class="menu-btn" onclick="setupMobileControls(true)">Yes, Gamepad Connected</button>
            <button class="menu-btn" onclick="setupMobileControls(false)">No, Use Touch Screen</button>
        </div>
    </div>

    <div id="hud">
        Speed: 0 km/h<br>
        <span id="surface" style="font-size:12px; color:#ef4444;">TRACK</span>
    </div>

    <div id="mobile-controls">
        <div id="btn-left" class="touch-btn">←</div>
        <div id="btn-right" class="touch-btn">→</div>
        <div id="btn-brake" class="touch-btn">BRAKE</div>
        <div id="btn-gas" class="touch-btn">GAS</div>
    </div>

    <script>
        let controlType = 'keyboard';
        let keys = { w: false, s: false, a: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        let touchInputs = { gas: false, brake: false, left: false, right: false };

        // Core Systems Data
        let scene, camera, renderer;
        let carMesh;
        let speed = 0;
        const maxSpeed = 1.8;
        const accel = 0.02;
        const deceleration = 0.01;
        const brakeForce = 0.04;
        let carAngle = 0;
        const trackHalfWidth = 12; // boundaries of pavement

        // Menu Routing System
        function selectPlatform(platform) {
            if (platform === 'laptop') {
                controlType = 'keyboard';
                initGame();
            } else if (platform === 'console') {
                controlType = 'controller';
                initGame();
            } else if (platform === 'mobile') {
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').style.display = 'block';
            }
        }

        function setupMobileControls(hasController) {
            if (hasController) {
                controlType = 'controller';
            } else {
                controlType = 'touch';
                document.getElementById('mobile-controls').style.display = 'block';
                setupTouchListeners();
            }
            initGame();
        }

        function setupTouchListeners() {
            const mappings = [
                { id: 'btn-gas', prop: 'gas' },
                { id: 'btn-brake', prop: 'brake' },
                { id: 'btn-left', prop: 'left' },
                { id: 'btn-right', prop: 'right' }
            ];
            mappings.forEach(mapping => {
                const el = document.getElementById(mapping.id);
                el.addEventListener('touchstart', (e) => { e.preventDefault(); touchInputs[mapping.prop] = true; }, {passive: false});
                el.addEventListener('touchend', (e) => { e.preventDefault(); touchInputs[mapping.prop] = false; }, {passive: false});
            });
        }

        window.addEventListener('keydown', (e) => { if(e.key in keys) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if(e.key in keys) keys[e.key] = false; });

        // Initialize Three.js Game World
        function initGame() {
            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('hud').style.display = 'block';

            // 1. Scene & Camera setups
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa5f3fc); // Sky Blue

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 2. Lighting environment
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xfffaed, 0.8);
            dirLight.position.set(100, 200, 50);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // 3. World Floors (Sand Terrain Environment)
            const sandGeo = new THREE.PlaneGeometry(2000, 2000);
            const sandMat = new THREE.MeshStandardMaterial({ color: 0xfef08a, roughness: 0.9 }); // Desert yellow sand
            const sandFloor = new THREE.Mesh(sandGeo, sandMat);
            sandFloor.rotation.x = -Math.PI / 2;
            sandFloor.receiveShadow = true;
            scene.add(sandFloor);

            // 4. Constructing Asphalt Main Track Strip
            const trackGeo = new THREE.PlaneGeometry(trackHalfWidth * 2, 2000);
            const trackMat = new THREE.MeshStandardMaterial({ color: 0x374151, roughness: 0.5 }); // Dark pavement
            const trackStrip = new THREE.Mesh(trackGeo, trackMat);
            trackStrip.rotation.x = -Math.PI / 2;
            trackStrip.position.y = 0.02; // Elevated slightly to prevent sand rendering clip issues
            trackStrip.receiveShadow = true;
            scene.add(trackStrip);

            // Decorative Red/White track border rumbles
            for(let z = -1000; z < 1000; z += 15) {
                const rumbleGeo = new THREE.BoxGeometry(0.8, 0.1, 7);
                const rumbleMat = new THREE.MeshStandardMaterial({ color: (Math.floor(z/15) % 2 === 0) ? 0xef4444 : 0xffffff });
                
                let leftRumble = new THREE.Mesh(rumbleGeo, rumbleMat);
                leftRumble.position.set(-trackHalfWidth, 0.05, z);
                scene.add(leftRumble);

                let rightRumble = leftRumble.clone();
                rightRumble.position.x = trackHalfWidth;
                scene.add(rightRumble);
            }

            // 5. Build Player's 3D Composite Car Mesh
            const carGroup = new THREE.Group();
            
            // Car Body Chassis
            const bodyGeo = new THREE.BoxGeometry(2.2, 0.8, 4.5);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.2, metalness: 0.5 }); // Racing Red
            const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
            bodyMesh.position.y = 0.5;
            bodyMesh.castShadow = true;
            carGroup.add(bodyMesh);

            // Cabin Window Glass
            const cabinGeo = new THREE.BoxGeometry(1.8, 0.6, 2);
            const cabinMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.1 });
            const cabinMesh = new THREE.Mesh(cabinGeo, cabinMat);
            cabinMesh.position.set(0, 1.1, -0.3);
            carGroup.add(cabinMesh);

            // Wheel templates
            const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.4, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            
            const wheelPositions = [
                [-1.2, 0.4, 1.4],  // Front Left
                [1.2, 0.4, 1.4],   // Front Right
                [-1.2, 0.4, -1.4], // Rear Left
                [1.2, 0.4, -1.4]   // Rear Right
            ];

            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI / 2;
                wheel.position.set(pos[0], pos[1], pos[2]);
                wheel.castShadow = true;
                carGroup.add(wheel);
            });

            carMesh = carGroup;
            scene.add(carMesh);

            // Set starting point tracking position
            carMesh.position.set(0, 0, 400);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Processing Input Variables
        function updatePhysics() {
            let moveForward = false;
            let moveBackward = false;
            let moveLeft = false;
            let moveRight = false;

            if (controlType === 'keyboard') {
                if (keys.w || keys.ArrowUp) moveForward = true;
                if (keys.s || keys.ArrowDown) moveBackward = true;
                if (keys.a || keys.ArrowLeft) moveLeft = true;
                if (keys.d || keys.ArrowRight) moveRight = true;
            } else if (controlType === 'touch') {
                if (touchInputs.gas) moveForward = true;
                if (touchInputs.brake) moveBackward = true;
                if (touchInputs.left) moveLeft = true;
                if (touchInputs.right) moveRight = true;
            } else if (controlType === 'controller') {
                const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
                const gp = gamepads[0] || gamepads[1];
                if (gp) {
                    if (gp.axes[0] < -0.2) moveLeft = true;
                    if (gp.axes[0] > 0.2) moveRight = true;
                    if ((gp.buttons[7] && gp.buttons[7].value > 0.1) || gp.buttons[0].pressed) moveForward = true;
                    if ((gp.buttons[6] && gp.buttons[6].value > 0.1) || gp.buttons[1].pressed) moveBackward = true;
                }
            }

            // Sand Trap check (Determine surface friction modifications)
            const inSandTrap = (Math.abs(carMesh.position.x) > trackHalfWidth);
            const currentMaxSpeed = inSandTrap ? maxSpeed * 0.25 : maxSpeed;

            const surfaceLabel = document.getElementById('surface');
            surfaceLabel.innerText = inSandTrap ? "⚠️ SAND TRAP (SLOW)" : "🏁 TRACK";
            surfaceLabel.style.color = inSandTrap ? "#fbbf24" : "#ef4444";

            // Process throttle limits
            if (moveForward) {
                speed = Math.min(speed + accel, currentMaxSpeed);
            } else if (moveBackward) {
                speed = Math.max(speed - brakeForce, -maxSpeed / 3);
            } else {
                // Drag loss friction values
                if (speed > 0) speed = Math.max(0, speed - deceleration);
                if (speed < 0) speed = Math.min(0, speed + deceleration);
            }

            // Force instantaneous drag speed dampening matching down to sand caps instantly
            if (speed > currentMaxSpeed) speed -= 0.05;

            // Turning logic configurations (only pivot matching moving parameters)
            if (Math.abs(speed) > 0.05) {
                const turnFactor = speed > 0 ? 0.025 : -0.025;
                if (moveLeft) carAngle += turnFactor;
                if (moveRight) carAngle -= turnFactor;
            }

            // Direction vector conversions
            carMesh.position.z -= Math.cos(carAngle) * speed;
            carMesh.position.x -= Math.sin(carAngle) * speed;
            carMesh.rotation.y = carAngle;

            // Infinite infinite procedural layout wrap boundaries tracking
            if (carMesh.position.z < -900) carMesh.position.z = 900;
            if (carMesh.position.z > 900) carMesh.position.z = -900;

            // Bound edge wall safety locks
            carMesh.position.x = Math.max(-150, Math.min(150, carMesh.position.x));

            // Display live diagnostics to interface overlay metric displays
            document.getElementById('hud').innerHTML = `Speed: ${Math.round(Math.abs(speed) * 120)} km/h<br><span id="surface" style="font-size:12px; color:${inSandTrap ? '#fbbf24':'#ef4444'}">${inSandTrap ? "⚠️ SAND TRAP (SLOW)" : "🏁 TRACK"}</span>`;
        }

        function updateCamera() {
            // Third-person vehicle chase mechanics relative to layout positions
            const backDist = 12;
            const heightTarget = 4.5;

            const targetCamX = carMesh.position.x + Math.sin(carAngle) * backDist;
            const targetCamZ = carMesh.position.z + Math.cos(carAngle) * backDist;
            const targetCamY = carMesh.position.y + heightTarget;

            // Linear interpolation camera dampening smoothly tracks position curves
            camera.position.x += (targetCamX - camera.position.x) * 0.1;
            camera.position.y += (targetCamY - camera.position.y) * 0.1;
            camera.position.z += (targetCamZ - camera.position.z) * 0.1;

            camera.lookAt(carMesh.position.x, carMesh.position.y + 1, carMesh.position.z);
        }

        // Active Application Game Loop Engine
        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            updateCamera();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
